<div class="ds-token-usage-display">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Token Count (Prev response)</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="container">
                <h3>All</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Prompt</th>
                            <th>Completion</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="prompt_tokens">-</td>
                            <td id="completion_tokens">-</td>
                            <td id="total_tokens">-</td>
                        </tr>
                    </tbody>
                </table>

                <h3>Details</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Cached</th>
                            <th>Reasoning</th>
                            <th>Response</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="cached_tokens">-</td>
                            <td id="reasoning_tokens">-</td>
                            <td id="response_tokens">-</td>
                        </tr>
                    </tbody>
                </table>

                <h3>Cached</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Hit</th>
                            <th>Miss</th>
                            <th>Ratio</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td id="prompt_cache_hit_tokens">-</td>
                            <td id="prompt_cache_miss_tokens">-</td>
                            <td id="cache_ratio">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
