<div class="ds-token-usage-display">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>DeepSeek Token Usage</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="container">
                <h3>All</h3>
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Prompt</th>
                            <th>Completion</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Last</td>
                            <td id="ds-token--prompt">-</td>
                            <td id="ds-token--completion">-</td>
                            <td id="ds-token--total">-</td>
                        </tr>
                        <tr>
                            <td>Session</td>
                            <td id="ds-token--session_prompt">-</td>
                            <td id="ds-token--session_completion">-</td>
                            <td id="ds-token--session_total">-</td>
                        </tr>
                        <tr>
                            <td>Cost</td>
                            <td id="ds-token--session_promptCost">-</td>
                            <td id="ds-token--session_completionCost">-</td>
                            <td id="ds-token--session_totalCost">-</td>
                        </tr>
                    </tbody>
                </table>

                <h3>Completion</h3>
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Reasoning</th>
                            <th>Response</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Last</td>
                            <td id="ds-token--reasoning">-</td>
                            <td id="ds-token--response">-</td>
                        </tr>
                        <tr>
                            <td>Session</td>
                            <td id="ds-token--session_reasoning">-</td>
                            <td id="ds-token--session_response">-</td>
                        </tr>
                    </tbody>
                </table>

                <h3>Cached</h3>
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Hit</th>
                            <th>Miss</th>
                            <th>Ratio</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Last</td>
                            <td id="ds-token--cacheHit">-</td>
                            <td id="ds-token--cacheMiss">-</td>
                            <td id="ds-token--ratio">-</td>
                        </tr>
                        <tr>
                            <td>Session</td>
                            <td id="ds-token--session_cacheHit">-</td>
                            <td id="ds-token--session_cacheMiss">-</td>
                            <td id="ds-token--session_ratio">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <hr>
        </div>
    </div>
</div>
